# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80

env:
  # Public environment variables (baked into build)
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://YOUR_DOMAIN"
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "YOUR_FIREBASE_API_KEY"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "YOUR_DOMAIN"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "your-project-id"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "your-project-id.firebasestorage.app"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "YOUR_MESSAGING_SENDER_ID"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "YOUR_APP_ID"
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    value: "pk_live_YOUR_KEY"
  - variable: NEXT_PUBLIC_STRIPE_PRICE_PRO_MONTHLY
    value: "price_YOUR_MONTHLY_PRICE_ID"
  - variable: NEXT_PUBLIC_STRIPE_PRICE_PRO_ANNUAL
    value: "price_YOUR_ANNUAL_PRICE_ID"

  # Server-side secrets (stored in Google Cloud Secret Manager).
  # Note: Firebase Admin uses Application Default Credentials in App Hosting —
  # no FB_SERVICE_ACCOUNT_KEY needed.
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME
  - variable: R2_ACCOUNT_ID
    secret: R2_ACCOUNT_ID
    availability:
      - RUNTIME
  - variable: R2_ACCESS_KEY_ID
    secret: R2_ACCESS_KEY_ID
    availability:
      - RUNTIME
  - variable: R2_SECRET_ACCESS_KEY
    secret: R2_SECRET_ACCESS_KEY
    availability:
      - RUNTIME
  - variable: R2_BUCKET
    secret: R2_BUCKET
    availability:
      - RUNTIME
  - variable: ADMIN_EMAILS
    secret: ADMIN_EMAILS
    availability:
      - RUNTIME
